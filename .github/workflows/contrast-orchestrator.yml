name: Contrast CI

on:
  workflow_call:
    inputs:
      # --- Contrast Platform (required) ---
      api_host:
        required: true
        type: string
        description: Contrast Platform base API URL
      contrast_org_id:
        required: true
        type: string
        description: Contrast organization UUID

      # --- Contrast Platform (optional override) ---
      contrast_application_id:
        required: false
        type: string
        default: ''
        description: Manual override for the Contrast application UUID (skips auto-detection)
      run_triage:
        required: false
        type: boolean
        default: true
        description: Whether to run contrast-triage feature in SmartScan
      triage_duration:
        required: false
        type: string
        default: '20s'
        description: Duration to run the contrast-triage tool (e.g. '1m', '5m').

      # --- Repo Context (required) ---
      base_branch:
        required: true
        type: string
        description: Default branch of the repository
      repo_url:
        required: true
        type: string
        description: GitHub repository URL
      repo_name:
        required: true
        type: string
        description: Repository full name (owner/repo)

      # --- EA Product Disable Flags ---
      disable_contrast_code:
        type: string
        default: 'false'
        description: Set to true to skip Contrast Code for this repo
      disable_contrast_sca:
        type: string
        default: 'false'
        description: Set to true to skip Static SCA scan for this repo
      disable_smartfix:
        type: string
        default: 'false'
        description: Set to true to skip SmartFix for this repo

      # --- SmartFix Config ---
      coding_agent:
        description: 'Specifies the coding agent to use for generating fixes. Allowed values: SMARTFIX, GITHUB_COPILOT, CLAUDE_CODE.'
        type: string
        required: false
        default: 'SMARTFIX'
      build_command:
        description: 'Build command to run before SmartFix'
        type: string
        default: 'echo No build command specified.'
      formatting_command:
        description: 'Format command to run before SmartFix'
        type: string
        default: ''
      max_open_prs:
        description: 'Maximum number of open PRs SmartFix will open'
        type: string
        default: '5'
      enable_full_telemetry:
        description: 'Enable SmartFix full telemetry for debugging'
        type: string
        default: 'true'
      debug_mode:
        description: 'Enable SmartFix debug mode for verbose logging'
        type: string
        default: 'false'

      # --- LLM Config ---
      use_contrast_llm:
        description: "Indicates to use Contrast internal LLM"
        type: string
        default: 'true'
      agent_model:
        description: 'The provider LLM model to use'
        type: string
        default: ''
      azure_api_base:
        description: 'The Azure API base URL'
        type: string
        default: ''
      azure_api_version:
        description: 'The Azure API version'
        type: string
        default: ''
      use_aws_creds_action:
        description: 'Whether to use configure AWS credentials action'
        type: string
        default: 'false'
      aws_region:
        description: 'The AWS region for Bedrock LLM'
        type: string
        default: ''

      # --- Runner ---
      github_runner:
        description: 'The GitHub runner to use (example: ubuntu-latest)'
        type: string
        default: 'ubuntu-latest'

    secrets:
      CONTRAST_API_KEY:
        description: The contrast API key
        required: true
      CONTRAST_AUTHORIZATION:
        description: The contrast authorization key
        required: true
      GH_TOKEN:
        description: The GitHub token
        required: true
      ANTHROPIC_API_KEY:
        description: The Anthropic API key
        required: false
      GEMINI_API_KEY:
        description: The Google Gemini API key
        required: false
      AZURE_API_KEY:
        description: The Azure API key
        required: false
      AWS_BEARER_TOKEN_BEDROCK:
        description: The AWS Bedrock API key
        required: false
      AWS_ROLE_TO_ASSUME:
        description: The AWS role to assume
        required: false
      AWS_ACCESS_KEY_ID:
        description: The AWS access key id
        required: false
      AWS_SECRET_ACCESS_KEY:
        description: The AWS secret access key
        required: false
      AWS_SESSION_TOKEN:
        description: The AWS session token
        required: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:

  # ─────────────────────────────────────────────────────────────────────
  # JOB 1: Resolve Applications via Contrast Recon + Resolver
  # Runs contrast-recon to discover repository modules, then pipes the
  # manifest to contrast-resolver to resolve modules to Contrast
  # application IDs. Replaces the former module-identifier step.
  # ─────────────────────────────────────────────────────────────────────
  contrast-recon-resolve:
    name: Resolve Applications
    if: |
      (inputs.disable_contrast_code != 'true' || inputs.disable_smartfix != 'true') &&
      (
        github.event_name == 'push' ||
        github.event_name == 'schedule' ||
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'pull_request' && github.event.action == 'closed' &&
          (
            contains(github.event.pull_request.head.ref, 'smartfix/remediation-') ||
            contains(github.event.pull_request.head.ref, 'copilot/fix-') ||
            contains(github.event.pull_request.head.ref, 'claude/issue-')
          )
        )
      )
    runs-on: ${{ inputs.github_runner }}
    outputs:
      contrast_ci_manifest: ${{ steps.set-outputs.outputs.contrast_ci_manifest }}
      contrast_app_ids:     ${{ steps.set-outputs.outputs.contrast_app_ids }}
      contrast_app_name:    ${{ steps.set-outputs.outputs.contrast_app_name }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS Credentials
        if: ${{ inputs.use_aws_creds_action == 'true' && inputs.aws_region != '' }}
        id: aws-credentials
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5.1.1
        with:
          output-credentials: true
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          role-to-assume:        ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region:            ${{ inputs.aws_region }}

      - name: Run Contrast Recon and Resolver
        id: resolve
        env:
          CONTRAST_HOST_NAME: ${{ inputs.api_host }}
          CONTRAST_ORG_ID: ${{ inputs.contrast_org_id }}
          CONTRAST_API_KEY: ${{ secrets.CONTRAST_API_KEY }}
          CONTRAST_AUTH_TOKEN: ${{ secrets.CONTRAST_AUTHORIZATION }}
          GITHUB_DEFAULT_BRANCH: ${{ inputs.base_branch }}
        run: |
          CONTRAST_CI_MANIFEST=$(docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}:/workspace" \
            contrast/contrast-recon:latest /workspace | \
          docker run --rm -i \
            --user "$(id -u):$(id -g)" \
            -e CONTRAST_HOST_NAME \
            -e CONTRAST_ORG_ID \
            -e CONTRAST_API_KEY \
            -e CONTRAST_AUTH_TOKEN \
            -e GITHUB_DEFAULT_BRANCH \
            -e GITHUB_ENV="$GITHUB_ENV" \
            -v "$(dirname $GITHUB_ENV):$(dirname $GITHUB_ENV)" \
            --entrypoint contrast-resolver \
            contrast/contrast-recon:latest)

          echo "Resolver output:"
          echo "$CONTRAST_CI_MANIFEST" | jq .

          # Write manifest to step output so set-outputs can read it
          echo "contrast_ci_manifest<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CONTRAST_CI_MANIFEST" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Set Contrast Application Data Outputs
        id: set-outputs
        shell: bash
        run: |
          CONTRAST_CI_MANIFEST='${{ steps.resolve.outputs.contrast_ci_manifest }}'

          # Write manifest to job output using heredoc delimiter
          echo "contrast_ci_manifest<<EOF" >> $GITHUB_OUTPUT
          echo "$CONTRAST_CI_MANIFEST" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # CONTRAST_APP_IDS is written to $GITHUB_ENV by the resolver.
          # Relay it to job output so downstream jobs can read it.
          if grep -q '^CONTRAST_APP_IDS=' "$GITHUB_ENV" 2>/dev/null; then
            APP_IDS=$(grep '^CONTRAST_APP_IDS=' "$GITHUB_ENV" | cut -d= -f2-)
            echo "contrast_app_ids=$APP_IDS" >> $GITHUB_OUTPUT
            echo "Resolved CONTRAST_APP_IDS: $APP_IDS"
          else
            echo "::warning::Resolver did not write CONTRAST_APP_IDS to GITHUB_ENV"
          fi

          # Extract first app name from resolver manifest for SAST backward compat
          APP_NAME=$(echo "$CONTRAST_CI_MANIFEST" | jq -r '[.resolutions[] | select(.appId != null)] | first | .appName // empty')
          if [[ -n "$APP_NAME" ]]; then
            echo "contrast_app_name=$APP_NAME" >> $GITHUB_OUTPUT
            echo "Resolved application name: $APP_NAME"
          fi

      - name: Warn if Application ID Not Found
        if: ${{ steps.set-outputs.outputs.contrast_app_ids == '' && inputs.contrast_application_id == '' }}
        shell: bash
        run: |
          MSG="Contrast application ID could not be automatically detected for repository '${{ inputs.repo_name }}'."
          MSG="${MSG} SmartFix will be skipped."
          MSG="${MSG}%0A%0ATo set the application ID manually, add 'contrast_application_id' to your workflow inputs:"
          MSG="${MSG}%0A  1. Browse your applications:"
          MSG="${MSG}%0A     ${{ inputs.api_host }}/Contrast/static/ng/index.html#/${{ inputs.contrast_org_id }}/applications"
          MSG="${MSG}%0A  2. Select your application"
          MSG="${MSG}%0A  3. The ID is the UUID after applications/ in the URL"
          MSG="${MSG}%0A     e.g. applications/057254e6-f065-40fa-8197-e1d7ace10e67"
          echo "::warning::${MSG}"

  # ─────────────────────────────────────────────────────────────────────
  # JOB 2: Run Contrast Code Scanner
  # Skipped if disable_contrast_code is 'true'.
  # ─────────────────────────────────────────────────────────────────────
  run-contrast-code:
    name: Code - SAST
    needs: contrast-recon-resolve
    if: |
      inputs.disable_contrast_code != 'true' &&
      (github.event_name == 'push' && github.ref == format('refs/heads/{0}', inputs.base_branch))
    runs-on: ${{ inputs.github_runner }}
    steps:
      - name: Validate Application Name
        shell: bash
        run: |
          APP_NAME="${{ needs.contrast-recon-resolve.outputs.contrast_app_name }}"
          if [[ -z "$APP_NAME" || "$APP_NAME" == "null" ]]; then
            echo "::warning::Contrast application name could not be automatically detected for repository '${{ inputs.repo_name }}'. Falling back to repository name."
          fi

      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      #- name: Configure AWS Credentials
        #if: ${{ inputs.use_aws_creds_action == 'true' && inputs.aws_region != '' }}
        #uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5.1.1
        #with:
          #aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          #aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          #aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          #role-to-assume:        ${{ secrets.AWS_ROLE_TO_ASSUME }}
          #aws-region:            ${{ inputs.aws_region }}

      - name: Get Repository Languages
        id: get-repo-langs
        uses: octokit/request-action@dad4362715b7fb2ddedf9772c8670824af564f0d # v2.4.0
        with:
          route: GET /repos/${{ inputs.repo_name }}/languages
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Parse Language Data
        id: parse-langs
        shell: bash
        run: |
          LANG_JSON='${{ steps.get-repo-langs.outputs.data }}'
          REPO_LANG_INFO=$(echo "$LANG_JSON" | jq -r 'to_entries[] | "\(.key),\(.value)"' | tr '\n' '|')
          echo "repo_lang_info=$REPO_LANG_INFO" >> $GITHUB_OUTPUT
          echo "Repo lang info: $REPO_LANG_INFO"

      - name: Set Branch Name
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "BRANCH_NAME=${{ github.head_ref }}" >> $GITHUB_ENV
          else
            echo "BRANCH_NAME=${{ github.ref_name }}" >> $GITHUB_ENV
          fi

      - name: Run Contrast Code Scanner
        uses: docker://contrast/sast-smartai
        env:
          # CONTRAST_CI_MANIFEST not yet supported by SAST container — uncomment when ready
          # CONTRAST_CI_MANIFEST: ${{ needs.contrast-recon-resolve.outputs.contrast_ci_manifest }}
          LOGLEVEL: 'DEBUG'
          REPO_NAME: ${{ github.event.repository.name }}
          REPO_LANG_INFO: ${{ steps.parse-langs.outputs.repo_lang_info }}
          REPO_HTTP_URL: ${{ inputs.repo_url }}/${{ inputs.repo_name }}
          BRANCH_NAME: ${{ env.BRANCH_NAME }}
          DEFAULT_BRANCH: ${{ inputs.base_branch }}
          APPLICATION_NAME: ${{ needs.contrast-recon-resolve.outputs.contrast_app_name || github.event.repository.name }}
          COMMIT_HASH: ${{ github.sha }}
          COMMITTER: ${{ github.triggering_actor }}
          TAG: ${{ github.ref }}
          RUN_ID: ${{ github.run_id }}
          WORKFLOW_ID: ${{ github.workflow_sha }}
          CONTRAST_BASE_URL: ${{ inputs.api_host }}
          CONTRAST_ORG_ID: ${{ inputs.contrast_org_id }}
          CONTRAST_API_KEY: ${{ secrets.CONTRAST_API_KEY }}
          CONTRAST_AUTHORIZATION: ${{ secrets.CONTRAST_AUTHORIZATION }}
          RUN_TRIAGE: ${{ inputs.run_triage }}
          TRIAGE_DURATION: ${{ inputs.triage_duration }}
          APPLICATION_DIR: ${{ github.workspace }}

  # ─────────────────────────────────────────────────────────────────────
  # JOB 3: Run Contrast SCA
  # SCA dependency scanning. Skipped if disable_contrast_sca is 'true'.
  # ─────────────────────────────────────────────────────────────────────
  run-sca:
    name: Code - Static SCA
    needs: contrast-recon-resolve
    if: |
      inputs.disable_contrast_sca != 'true' &&
      (github.event_name == 'push' && github.ref == format('refs/heads/{0}', inputs.base_branch))
    runs-on: ${{ inputs.github_runner }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run Contrast Code Static SCA Scanner
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/var/app:rw \
            -v /tmp:/tmp:rw \
            -e GITHUB_TOKEN=${{ secrets.GH_TOKEN }} \
            -e CDXGEN_DEBUG_MODE=true \
            contrast/sca-smartai:latest \
            scan /var/app --output /tmp/sbom.json --debug /tmp/sbom.debug
          # CONTRAST_CI_MANIFEST not yet supported by SCA container — uncomment when ready
          # Add to docker run above: -e CONTRAST_CI_MANIFEST='${{ needs.contrast-recon-resolve.outputs.contrast_ci_manifest }}'

      - name: Archive SBOM results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: sbom-output
          path: /tmp/sbom*

      - name: Upload SBOM to Contrast
        run: |
          ls -la /tmp/sbom.json
          curl -v -X POST "${{ inputs.api_host }}/api/sca/v1/organizations/${{ inputs.contrast_org_id }}/sbom" \
            -H "API-Key: ${{ secrets.CONTRAST_API_KEY }}" \
            -H "Authorization: ${{ secrets.CONTRAST_AUTHORIZATION }}" \
            -F "file=@/tmp/sbom.json;type=application/json"

  # ─────────────────────────────────────────────────────────────────────
  # JOB 4: Run Contrast SmartFix
  # AI-powered fix PR generation. Event-gated — only runs on:
  #   • pull_request (closed) — handles merge notification or PR close
  #   • workflow_dispatch     — manual trigger to generate fixes
  #   • schedule              — scheduled fix generation
  # Does NOT run on PR open/synchronize to avoid redundant runs.
  # ─────────────────────────────────────────────────────────────────────
  run-smartfix:
    name: SmartFix
    needs: contrast-recon-resolve
    if: |
      inputs.disable_smartfix != 'true' &&
      (needs.contrast-recon-resolve.outputs.contrast_app_ids != '' || inputs.contrast_application_id != '') &&
      (
        github.event_name == 'workflow_dispatch' ||
        github.event_name == 'schedule' ||
        (
          github.event_name == 'pull_request' && github.event.action == 'closed' &&
          (
            contains(github.event.pull_request.head.ref, 'smartfix/remediation-') ||
            contains(github.event.pull_request.head.ref, 'copilot/fix-') ||
            contains(github.event.pull_request.head.ref, 'claude/issue-')
          )
        )
      )
    runs-on: ${{ inputs.github_runner }}
    steps:
      - name: Determine SmartFix Job Type
        id: job_type
        run: |
          if [[ "${{ github.event.pull_request.merged }}" == "true" ]]; then
            echo "label=Notify Contrast on PR Merge" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event.pull_request.merged }}" == "false" ]]; then
            echo "label=Handle PR Close" >> $GITHUB_OUTPUT
          else
            echo "label=Run Contrast AI SmartFix - Generate Fixes" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS Credentials
        if: ${{ inputs.use_aws_creds_action == 'true' && inputs.aws_region != '' }}
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5.1.1
        with:
          output-env-credentials: true
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          role-to-assume:        ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region:            ${{ inputs.aws_region }}

      - name: ${{ steps.job_type.outputs.label }}
        uses: Contrast-Security-OSS/contrast-ai-smartfix-action@release_candidate
        with:
          aws_region:                 ${{ inputs.aws_region }}
          contrast_host:              ${{ inputs.api_host }}
          contrast_org_id:            ${{ inputs.contrast_org_id }}
          contrast_app_id:            ${{ inputs.contrast_application_id }}
          contrast_app_ids:           ${{ needs.contrast-recon-resolve.outputs.contrast_app_ids }}
          base_branch:                ${{ inputs.base_branch }}
          build_command:              ${{ inputs.build_command }}
          formatting_command:         ${{ inputs.formatting_command }}
          use_contrast_llm:           ${{ inputs.use_contrast_llm }}
          max_open_prs:               ${{ inputs.max_open_prs }}
          agent_model:                ${{ inputs.agent_model }}
          azure_api_base:             ${{ inputs.azure_api_base }}
          azure_api_version:          ${{ inputs.azure_api_version }}
          enable_full_telemetry:      ${{ inputs.enable_full_telemetry }}
          debug_mode:                 ${{ inputs.debug_mode }}
          coding_agent:               ${{ inputs.coding_agent }}
          contrast_api_key:           ${{ secrets.CONTRAST_API_KEY }}
          contrast_authorization_key: ${{ secrets.CONTRAST_AUTHORIZATION }}
          github_token:               ${{ secrets.GH_TOKEN }}
          gemini_api_key:             ${{ secrets.GEMINI_API_KEY }}
          anthropic_api_key:          ${{ secrets.ANTHROPIC_API_KEY }}
          azure_api_key:              ${{ secrets.AZURE_API_KEY }}
          aws_bearer_token_bedrock:   ${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}
